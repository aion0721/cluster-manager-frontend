apiVersion: v1
kind: Namespace
metadata:
  name: cluster-manager-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-manager-frontend
  namespace: cluster-manager-system
  labels:
    app: cluster-manager-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-manager-frontend
  template:
    metadata:
      labels:
        app: cluster-manager-frontend
    spec:
      containers:
        - name: frontend
          image: cluster-manager-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-manager-frontend
  namespace: cluster-manager-system
  labels:
    app: cluster-manager-frontend
spec:
  selector:
    app: cluster-manager-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
